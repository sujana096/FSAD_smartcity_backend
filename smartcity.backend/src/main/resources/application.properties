spring.application.name=smartcity.backend

# PORT (required for Railway)
server.port=${PORT:8080}

# TEMP: Disable DB so app doesn't crash on Railway
spring.autoconfigure.exclude=org.springframework.boot.autoconfigure.jdbc.DataSourceAutoConfiguration

# (Keep these for later when DB is set up)
spring.datasource.url=jdbc:mysql://localhost:3306/smartcity
spring.datasource.username=root
spring.datasource.password=1234

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect